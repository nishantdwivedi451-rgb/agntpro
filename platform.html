<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgntPro.ai — Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}html,body,#root{height:100%;overflow:hidden}body{font-family:'Sora',sans-serif;background:#F8F7FC;color:#141210;-webkit-font-smoothing:antialiased}@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}@keyframes spin{to{transform:rotate(360deg)}}*{scrollbar-width:thin;scrollbar-color:#E6E3DC transparent}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#E6E3DC;border-radius:3px}input:focus,textarea:focus{border-color:#2563EB!important;outline:none}button{font-family:'Sora',sans-serif;cursor:pointer}button:hover{opacity:.92}.spinner{width:20px;height:20px;border:2px solid rgba(37,99,235,.2);border-top-color:#2563EB;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useRef,useEffect}=React;
const API_BASE=window.location.hostname==="localhost"?"http://localhost:8080":"https://agntpro-api-XXXXX-el.a.run.app";

async function api(p,o={}){const t=localStorage.getItem("agntpro_token");const h={...(o.headers||{})};if(t)h["Authorization"]="Bearer "+t;if(!(o.body instanceof FormData))h["Content-Type"]="application/json";try{const r=await fetch(API_BASE+p,{...o,headers:h});const d=await r.json();if(r.status===401){localStorage.clear();window.location.reload();return{error:"Session expired"}}if(!r.ok)return{error:d.error||"Failed"};return d}catch(e){return{error:"Network error"}}}

function App(){const[user,setUser]=useState(null);const[ld,setLd]=useState(true);useEffect(()=>{const t=localStorage.getItem("agntpro_token");const u=localStorage.getItem("agntpro_user");if(t&&u)setUser(JSON.parse(u));setLd(false)},[]);if(ld)return<Ld/>;if(!user)return<Auth onLogin={(u,t)=>{localStorage.setItem("agntpro_token",t);localStorage.setItem("agntpro_user",JSON.stringify(u));setUser(u)}}/>;return<Dash user={user} onLogout={()=>{localStorage.clear();setUser(null)}}/>}
function Ld(){return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh"}}><div className="spinner" style={{width:32,height:32,borderWidth:3}}/></div>}

function Auth({onLogin}){const[mode,setMode]=useState("login");const[email,setEmail]=useState("");const[pw,setPw]=useState("");const[name,setName]=useState("");const[co,setCo]=useState("");const[err,setErr]=useState("");const[ld,setLd]=useState(false);
async function go(){setErr("");setLd(true);const d=await api(mode==="login"?"/api/auth/login":"/api/auth/signup",{method:"POST",body:JSON.stringify(mode==="login"?{email,password:pw}:{email,password:pw,name,company:co})});if(d.error){setErr(d.error);setLd(false);return}onLogin(d.user,d.token)}
return(<div style={{display:"flex",height:"100vh",background:"linear-gradient(135deg,#EFF6FF 0%,#F0FDFA 50%,#FAFAF8 100%)"}}>
<div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",padding:"0 80px"}}>
<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:40}}><div style={{width:40,height:40,borderRadius:10,background:"#2563EB",color:"#fff",fontSize:18,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'IBM Plex Mono'"}}>A</div><span style={{fontFamily:"'IBM Plex Mono'",fontSize:26,fontWeight:700}}>AgntPro<span style={{color:"#2563EB"}}>.ai</span></span></div>
<h1 style={{fontSize:42,fontWeight:800,lineHeight:1.1,letterSpacing:-1.5,marginBottom:14}}>AI Agents for<br/><span style={{background:"linear-gradient(135deg,#2563EB,#0D9488)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Every Channel</span></h1>
<p style={{fontSize:17,color:"#3D3A34",lineHeight:1.7,maxWidth:420}}>Deploy chatbots on your website, WhatsApp, and RCS. Just write a prompt.</p>
<div style={{display:"flex",gap:28,marginTop:36}}>{[["100+","Agents"],["3","Channels"],["89%","Resolution"]].map(([v,l],i)=>(<div key={i}><div style={{fontSize:22,fontWeight:700,fontFamily:"'IBM Plex Mono'",color:"#2563EB"}}>{v}</div><div style={{fontSize:11,color:"#8A8680",marginTop:2}}>{l}</div></div>))}</div>
</div>
<div style={{width:460,display:"flex",alignItems:"center",justifyContent:"center",padding:40}}>
<div style={{width:"100%",maxWidth:380,background:"#fff",borderRadius:16,padding:32,boxShadow:"0 16px 48px rgba(20,18,16,.08)",border:"1px solid #E6E3DC"}}>
<h2 style={{fontSize:20,fontWeight:700,marginBottom:4}}>{mode==="login"?"Welcome back":"Create account"}</h2>
<p style={{fontSize:13,color:"#8A8680",marginBottom:22}}>{mode==="login"?"Sign in to your dashboard":"Start building agents in minutes"}</p>
{err&&<div style={{background:"#FFF1F2",border:"1px solid #FECDD3",borderRadius:8,padding:"8px 12px",marginBottom:14,fontSize:12,color:"#E11D48"}}>{err}</div>}
{mode==="signup"&&<><div style={{marginBottom:12}}><label style={lbl}>Full Name</label><input value={name} onChange={e=>setName(e.target.value)} placeholder="Nishant Dwivedi" style={inp}/></div><div style={{marginBottom:12}}><label style={lbl}>Company</label><input value={co} onChange={e=>setCo(e.target.value)} placeholder="AgntPro.ai" style={inp}/></div></>}
<div style={{marginBottom:12}}><label style={lbl}>Email</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="nishant@agntpro.ai" style={inp}/></div>
<div style={{marginBottom:18}}><label style={lbl}>Password</label><input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="Min 6 characters" style={inp} onKeyDown={e=>{if(e.key==="Enter")go()}}/></div>
<button onClick={go} disabled={ld} style={{...bp,width:"100%",padding:"12px 0",fontSize:14,opacity:ld?.7:1}}>{ld?<span className="spinner" style={{width:16,height:16,borderWidth:2}}/>:(mode==="login"?"Sign In":"Create Account")}</button>
<div style={{textAlign:"center",marginTop:18,fontSize:12,color:"#8A8680"}}>{mode==="login"?"No account? ":"Have an account? "}<button onClick={()=>{setMode(mode==="login"?"signup":"login");setErr("")}} style={{background:"none",border:"none",color:"#2563EB",fontWeight:600,fontSize:12,cursor:"pointer"}}>{mode==="login"?"Sign Up":"Sign In"}</button></div>
</div></div></div>)}

function Dash({user,onLogout}){const[view,setView]=useState("agents");const[agents,setAgents]=useState([]);const[aid,setAid]=useState(null);const[showC,setShowC]=useState(false);const[col,setCol]=useState(false);const[ldA,setLdA]=useState(true);
useEffect(()=>{load()},[]);
async function load(){setLdA(true);const d=await api("/api/agents");if(d.agents){setAgents(d.agents);if(d.agents.length>0&&!aid)setAid(d.agents[0]._id)}setLdA(false)}
async function create(t){const temps={ecommerce:{name:"ShopEase Support",avatar:"S",color:"#2563EB",prompt:"You are ShopEase's AI support agent. Help with orders, returns, products.\n\nTone: Friendly, concise."},bfsi:{name:"QuickLoan Advisor",avatar:"Q",color:"#1D4ED8",prompt:"You are QuickLoan's advisor. Help with loans, EMI, documents.\n\nTone: Professional."},insurance:{name:"SecureLife Agent",avatar:"SL",color:"#059669",prompt:"You are SecureLife's advisor. Plans: Essential Rs499, Premium Rs899, Family Rs1299.\n\nTone: Reassuring."}};const p=temps[t]||temps.ecommerce;const d=await api("/api/agents",{method:"POST",body:JSON.stringify(p)});if(d.agent){setAgents(prev=>[d.agent,...prev]);setAid(d.agent._id);setShowC(false);setView("chat")}}
async function del(id){if(agents.length<=1)return;await api("/api/agents/"+id,{method:"DELETE"});setAgents(prev=>prev.filter(a=>a._id!==id));if(aid===id)setAid(agents.find(a=>a._id!==id)?._id)}
const act=agents.find(a=>a._id===aid);const sw=col?64:240;

return(<div style={{display:"flex",height:"100vh",overflow:"hidden"}}>
<div style={{width:sw,minWidth:sw,background:"#fff",borderRight:"1px solid #E6E3DC",display:"flex",flexDirection:"column",transition:"all .25s",overflow:"hidden",flexShrink:0}}>
<div style={{padding:14,display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid #F0EEE8",minHeight:56}}>
{!col&&<a href="index.html" style={{display:"flex",alignItems:"center",gap:6,textDecoration:"none"}}><div style={{width:24,height:24,borderRadius:6,background:"#2563EB",color:"#fff",fontSize:11,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'IBM Plex Mono'"}}>A</div><span style={{fontFamily:"'IBM Plex Mono'",fontSize:14,fontWeight:700,color:"#141210",letterSpacing:-.5}}>AgntPro<span style={{color:"#2563EB"}}>.ai</span></span></a>}
<button onClick={()=>setCol(!col)} style={{width:26,height:26,borderRadius:6,border:"1px solid #E6E3DC",background:"transparent",fontSize:11,color:"#8A8680",display:"flex",alignItems:"center",justifyContent:"center"}}>{col?"▸":"◂"}</button></div>
<div style={{padding:"10px 6px",display:"flex",flexDirection:"column",gap:2}}>
{[{id:"agents",icon:"A",l:"My Agents"},{id:"chat",icon:"C",l:"Test Chat"},{id:"knowledge",icon:"K",l:"Knowledge Base"},{id:"channels",icon:"CH",l:"Channels"},{id:"settings",icon:"S",l:"Settings"},{id:"analytics",icon:"AN",l:"Analytics"}].map(i=>(<button key={i.id} onClick={()=>setView(i.id)} title={i.l} style={{display:"flex",alignItems:"center",gap:9,border:"none",borderRadius:8,fontSize:13,fontWeight:view===i.id?600:500,color:view===i.id?"#2563EB":"#3D3A34",background:view===i.id?"#EFF6FF":"transparent",padding:col?10:"9px 14px",justifyContent:col?"center":"flex-start",transition:"all .15s",textAlign:"left"}}><span style={{fontFamily:"'IBM Plex Mono'",fontSize:11,fontWeight:700,width:24,height:24,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",background:view===i.id?"#2563EB":"#F0EEE8",color:view===i.id?"#fff":"#8A8680",flexShrink:0}}>{i.icon}</span>{!col&&<span style={{whiteSpace:"nowrap"}}>{i.l}</span>}</button>))}
</div>
{!col&&<div style={{flex:1,padding:"10px 6px",borderTop:"1px solid #F0EEE8",overflow:"auto",display:"flex",flexDirection:"column"}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 8px",marginBottom:6}}><span style={{fontSize:10,fontWeight:700,color:"#B5B1AA",letterSpacing:1.5,fontFamily:"'IBM Plex Mono'"}}>AGENTS</span><button onClick={()=>setShowC(true)} style={{width:20,height:20,borderRadius:5,border:"1px solid #E6E3DC",background:"transparent",fontSize:13,color:"#2563EB",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button></div>
{agents.map(a=>(<button key={a._id} onClick={()=>{setAid(a._id);setView("chat")}} style={{display:"flex",alignItems:"center",gap:9,width:"100%",padding:"8px 10px",border:"none",borderRadius:8,background:aid===a._id?"#EFF6FF":"transparent",textAlign:"left",fontSize:12}}><span style={{fontFamily:"'IBM Plex Mono'",fontWeight:700,width:28,height:28,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",background:a.color||"#2563EB",color:"#fff",fontSize:11,flexShrink:0}}>{a.avatar}</span><div style={{flex:1,overflow:"hidden"}}><div style={{fontSize:12,fontWeight:600,color:"#141210",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{a.name}</div></div></button>))}
<div style={{marginTop:"auto",padding:"10px 8px",borderTop:"1px solid #F0EEE8"}}><div style={{fontSize:11,color:"#8A8680",marginBottom:4}}>{user.name}</div><button onClick={onLogout} style={{fontSize:11,color:"#E11D48",background:"none",border:"none",fontWeight:600}}>Sign Out</button></div></div>}
</div>

<div style={{flex:1,overflow:"auto",background:"#F8F7FC"}}>
{ldA?<Ld/>:agents.length===0?<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",padding:40,textAlign:"center"}}><div style={{fontSize:48,marginBottom:16,fontFamily:"'IBM Plex Mono'",color:"#B5B1AA"}}>+</div><h2 style={{fontSize:22,fontWeight:700,marginBottom:8}}>Create your first AI agent</h2><p style={{fontSize:14,color:"#8A8680",maxWidth:380,lineHeight:1.7,marginBottom:24}}>Deploy an AI chatbot on your website, WhatsApp, or RCS in minutes.</p><button onClick={()=>setShowC(true)} style={{...bp,padding:"12px 32px",fontSize:15}}>Create Agent</button></div>:<>
{view==="agents"&&<AV agents={agents} aid={aid} onSel={id=>{setAid(id);setView("chat")}} onNew={()=>setShowC(true)} onDel={del}/>}
{view==="chat"&&act&&<CV agent={act}/>}
{view==="knowledge"&&act&&<KV agent={act} rl={load}/>}
{view==="channels"&&act&&<ChV agent={act} rl={load}/>}
{view==="settings"&&act&&<SV agent={act} rl={load}/>}
{view==="analytics"&&act&&<StV agent={act}/>}
</>}
</div>
{showC&&<Mod onClose={()=>setShowC(false)} title="Create Agent"><p style={{fontSize:13,color:"#8A8680",marginBottom:20}}>Choose a template.</p><div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>{[["ecommerce","S","ShopEase","E-COM"],["bfsi","Q","QuickLoan","BFSI"],["insurance","SL","SecureLife","INSURE"]].map(([k,av,nm,tg])=>(<button key={k} onClick={()=>create(k)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8,padding:"20px 14px",border:"1.5px solid #E6E3DC",borderRadius:12,background:"#fff"}}><span style={{fontFamily:"'IBM Plex Mono'",fontWeight:700,width:40,height:40,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",background:"#2563EB",color:"#fff",fontSize:14}}>{av}</span><span style={{fontSize:12,fontWeight:600}}>{nm}</span><span style={{fontSize:9,fontWeight:700,color:"#2563EB",letterSpacing:1,fontFamily:"'IBM Plex Mono'"}}>{tg}</span></button>))}</div></Mod>}
</div>)}

function AV({agents,aid,onSel,onNew,onDel}){return(<div style={{padding:"24px 28px",maxWidth:1100}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:24}}><div><h1 style={{fontSize:24,fontWeight:700,letterSpacing:-.5,marginBottom:4}}>My Agents</h1><p style={{fontSize:13,color:"#8A8680"}}>Manage AI agents</p></div><button onClick={onNew} style={bp}>+ Create Agent</button></div><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:16}}>{agents.map(a=>(<div key={a._id} style={{background:"#fff",borderRadius:14,border:"1.5px solid "+(aid===a._id?"#2563EB":"#E6E3DC"),padding:22}}><div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}><div style={{width:44,height:44,borderRadius:12,background:a.color||"#2563EB",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontFamily:"'IBM Plex Mono'",fontWeight:700,fontSize:14}}>{a.avatar}</div><div style={{flex:1}}><h3 style={{fontSize:16,fontWeight:600}}>{a.name}</h3></div></div><p style={{fontSize:12,color:"#8A8680",lineHeight:1.6,marginBottom:14}}>{a.prompt?.slice(0,100)}...</p><div style={{display:"flex",gap:8}}><button onClick={()=>onSel(a._id)} style={bs}>Test Chat</button>{agents.length>1&&<button onClick={()=>onDel(a._id)} style={{...bs,background:"#FFF1F2",color:"#E11D48"}}>Delete</button>}</div></div>))}<button onClick={onNew} style={{background:"#fff",borderRadius:14,border:"2px dashed #E6E3DC",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:180,gap:6}}><span style={{fontSize:28,color:"#B5B1AA"}}>+</span><span style={{fontSize:13,color:"#8A8680"}}>New Agent</span></button></div></div>)}

function CV({agent}){const[msgs,setMsgs]=useState([]);const[input,setInput]=useState("");const[ld,setLd]=useState(false);const[cid,setCid]=useState(null);const ref=useRef(null);const iRef=useRef(null);useEffect(()=>{if(ref.current)ref.current.scrollTop=ref.current.scrollHeight},[msgs]);useEffect(()=>{setMsgs([]);setCid(null)},[agent._id]);
async function send(){if(!input.trim()||ld)return;const m=input.trim();setInput("");setMsgs(p=>[...p,{r:"user",c:m}]);setLd(true);const d=await api("/api/chat/"+agent._id+"/message",{method:"POST",body:JSON.stringify({message:m,conversationId:cid})});if(d.response){setMsgs(p=>[...p,{r:"assistant",c:d.response}]);if(d.conversationId)setCid(d.conversationId)}else setMsgs(p=>[...p,{r:"assistant",c:d.error||"Error"}]);setLd(false);if(iRef.current)iRef.current.focus()}
return(<div style={{display:"flex",flexDirection:"column",height:"100vh"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 24px",background:"#fff",borderBottom:"1px solid #E6E3DC"}}><div style={{display:"flex",alignItems:"center",gap:10}}><div style={{width:32,height:32,borderRadius:8,background:agent.color||"#2563EB",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontFamily:"'IBM Plex Mono'",fontWeight:700,fontSize:12}}>{agent.avatar}</div><div><h2 style={{fontSize:15,fontWeight:600,margin:0}}>{agent.name}</h2><span style={{fontSize:11,color:"#059669"}}>Active</span></div></div><button onClick={()=>{setMsgs([]);setCid(null)}} style={bo}>Clear</button></div>
<div style={{flex:1,display:"flex",overflow:"hidden",padding:20,gap:20}}>
<div style={{width:360,background:"#141210",borderRadius:32,padding:10,boxShadow:"0 16px 48px rgba(20,18,16,.18)",flexShrink:0}}><div style={{background:"#fff",borderRadius:24,overflow:"hidden",display:"flex",flexDirection:"column",height:560}}>
<div style={{display:"flex",justifyContent:"space-between",padding:"10px 18px 4px",fontSize:11,fontWeight:600}}><span>9:41</span><span>5G</span></div>
<div style={{display:"flex",alignItems:"center",gap:9,padding:"6px 14px 10px",borderBottom:"1px solid #F0EEE8"}}><div style={{width:30,height:30,borderRadius:8,background:agent.color||"#2563EB",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontFamily:"'IBM Plex Mono'",fontWeight:700,fontSize:10}}>{agent.avatar}</div><div><div style={{fontSize:13,fontWeight:600}}>{agent.name}</div><div style={{fontSize:10,color:"#059669"}}>online</div></div></div>
<div ref={ref} style={{flex:1,overflowY:"auto",padding:12,display:"flex",flexDirection:"column",gap:7,background:"#FAFAF8"}}>
{msgs.length===0&&<div style={{textAlign:"center",padding:"28px 14px"}}><div style={{fontFamily:"'IBM Plex Mono'",fontWeight:700,fontSize:28,color:"#B5B1AA",marginBottom:10}}>{agent.avatar}</div><p style={{fontSize:12,color:"#8A8680",lineHeight:1.5}}>Start a conversation</p><div style={{display:"flex",flexDirection:"column",gap:4,marginTop:14}}>{["Where is my order?","I need help with returns","Product availability"].map((q,i)=>(<button key={i} onClick={()=>setInput(q)} style={{background:"#fff",border:"1px solid #E6E3DC",borderRadius:8,padding:"7px 12px",fontSize:11,color:"#3D3A34",textAlign:"left"}}>{q}</button>))}</div></div>}
{msgs.map((m,i)=>(<div key={i} style={{maxWidth:"78%",padding:"9px 13px",borderRadius:14,fontSize:12,lineHeight:1.5,whiteSpace:"pre-line",animation:"fadeIn .25s",alignSelf:m.r==="user"?"flex-end":"flex-start",background:m.r==="user"?"#2563EB":"#fff",color:m.r==="user"?"#fff":"#141210",borderBottomRightRadius:m.r==="user"?4:14,borderBottomLeftRadius:m.r==="assistant"?4:14,border:m.r==="assistant"?"1px solid #E6E3DC":"none"}}>{m.c}</div>))}
{ld&&<div style={{alignSelf:"flex-start",background:"#fff",border:"1px solid #E6E3DC",borderRadius:14,borderBottomLeftRadius:4,padding:"12px 16px",display:"flex",gap:4}}>{[0,.15,.3].map((d,i)=>(<span key={i} style={{width:6,height:6,borderRadius:"50%",background:"#B5B1AA",animation:"bounce 1.2s ease-in-out "+d+"s infinite",display:"inline-block"}}/>))}</div>}
</div>
<div style={{display:"flex",alignItems:"center",gap:7,padding:"9px 12px",borderTop:"1px solid #F0EEE8"}}><input ref={iRef} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")send()}} placeholder="Type a message..." style={{flex:1,border:"1px solid #E6E3DC",borderRadius:16,padding:"8px 12px",fontSize:12,fontFamily:"'Sora'",background:"#FAFAF8",outline:"none"}}/><button onClick={send} disabled={!input.trim()||ld} style={{width:30,height:30,borderRadius:"50%",background:"#2563EB",border:"none",color:"#fff",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,opacity:input.trim()?1:.4}}>&#8593;</button></div>
</div></div>
<div style={{flex:1,display:"flex",flexDirection:"column",gap:14,overflow:"auto",minWidth:240,maxWidth:320}}>
<Card t="Session">{[["Messages",msgs.length],["Channel","Website"],["Model","GPT-4o / Claude"]].map(([k,v],i)=>(<div key={i} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #F0EEE8",fontSize:12}}><span style={{color:"#8A8680"}}>{k}</span><span style={{fontWeight:600}}>{v}</span></div>))}</Card>
</div></div></div>)}

function KV({agent,rl}){const[items,setItems]=useState([]);const[tab,setTab]=useState("pdf");const[url,setUrl]=useState("");const[tn,setTn]=useState("");const[tc,setTc]=useState("");const[ld,setLd]=useState(false);const[st,setSt]=useState("");const fr=useRef(null);useEffect(()=>{lk()},[agent._id]);
async function lk(){const d=await api("/api/knowledge/"+agent._id);if(d.items)setItems(d.items)}
async function upPDF(e){const f=e.target.files[0];if(!f)return;setLd(true);setSt("Extracting...");const fd=new FormData();fd.append("file",f);const tk=localStorage.getItem("agntpro_token");try{const r=await fetch(API_BASE+"/api/knowledge/"+agent._id+"/pdf",{method:"POST",headers:{Authorization:"Bearer "+tk},body:fd});const d=await r.json();if(d.item){setItems(p=>[d.item,...p]);setSt("Done")}else setSt("Error: "+d.error)}catch(e){setSt("Failed")}setLd(false);setTimeout(()=>setSt(""),3000)}
async function scrape(){if(!url.trim())return;setLd(true);setSt("Scraping...");const d=await api("/api/knowledge/"+agent._id+"/url",{method:"POST",body:JSON.stringify({url})});if(d.item){setItems(p=>[d.item,...p]);setUrl("");setSt("Done")}else setSt("Error");setLd(false);setTimeout(()=>setSt(""),3000)}
async function addT(){if(!tn.trim()||!tc.trim())return;const d=await api("/api/knowledge/"+agent._id+"/text",{method:"POST",body:JSON.stringify({name:tn,content:tc})});if(d.item){setItems(p=>[d.item,...p]);setTn("");setTc("")}}
async function rm(id){await api("/api/knowledge/"+agent._id+"/"+id,{method:"DELETE"});setItems(p=>p.filter(i=>i._id!==id))}
return(<div style={{padding:"24px 28px",maxWidth:860}}><h1 style={{fontSize:24,fontWeight:700,marginBottom:4}}>Knowledge Base</h1><p style={{fontSize:13,color:"#8A8680",marginBottom:24}}>{agent.name}</p>
{st&&<div style={{background:st==="Done"?"#ECFDF5":"#FFFBEB",border:"1px solid "+(st==="Done"?"#A7F3D0":"#FDE68A"),borderRadius:8,padding:"8px 14px",marginBottom:16,fontSize:12,color:st==="Done"?"#065F46":"#92400E"}}>{st}</div>}
<div style={{display:"flex",gap:6,marginBottom:20}}>{[["pdf","PDF"],["url","URL"],["text","Text"]].map(([id,l])=>(<button key={id} onClick={()=>setTab(id)} style={{padding:"7px 16px",borderRadius:8,fontSize:12,fontWeight:tab===id?600:500,border:"1.5px solid "+(tab===id?"#2563EB":"#E6E3DC"),background:tab===id?"#EFF6FF":"#fff",color:tab===id?"#2563EB":"#3D3A34"}}>{l}</button>))}</div>
{tab==="pdf"&&<div><input ref={fr} type="file" accept=".pdf" onChange={upPDF} style={{display:"none"}}/><div onClick={()=>fr.current?.click()} style={{border:"2px dashed #E6E3DC",borderRadius:14,padding:"40px 24px",textAlign:"center",cursor:"pointer",background:"#fff"}}><div style={{fontFamily:"'IBM Plex Mono'",fontSize:28,color:"#B5B1AA",marginBottom:8}}>PDF</div><p style={{fontSize:12,color:"#8A8680"}}>Click to upload. Text extracted via AI.</p></div></div>}
{tab==="url"&&<div style={{background:"#fff",borderRadius:14,border:"1px solid #E6E3DC",padding:24}}><div style={{display:"flex",gap:10}}><input value={url} onChange={e=>setUrl(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")scrape()}} placeholder="https://example.com/faq" style={inp}/><button onClick={scrape} disabled={ld} style={{...bp,whiteSpace:"nowrap"}}>{ld?"...":"Extract"}</button></div></div>}
{tab==="text"&&<div style={{background:"#fff",borderRadius:14,border:"1px solid #E6E3DC",padding:24}}><input value={tn} onChange={e=>setTn(e.target.value)} placeholder="Document name" style={{...inp,marginBottom:10}}/><textarea value={tc} onChange={e=>setTc(e.target.value)} placeholder="Paste content..." rows={8} style={{...inp,resize:"vertical",lineHeight:1.6,marginBottom:14}}/><button onClick={addT} style={bp}>Add</button></div>}
<h3 style={{fontSize:15,fontWeight:600,marginTop:28,marginBottom:14}}>Documents ({items.length})</h3>
{items.length===0?<div style={{textAlign:"center",padding:40,background:"#fff",borderRadius:14,border:"1px solid #E6E3DC"}}><p style={{fontSize:13,color:"#8A8680"}}>No documents yet.</p></div>:<div style={{display:"flex",flexDirection:"column",gap:8}}>{items.map(i=>(<div key={i._id} style={{display:"flex",alignItems:"center",gap:12,background:"#fff",borderRadius:10,border:"1px solid #E6E3DC",padding:14}}><div style={{fontFamily:"'IBM Plex Mono'",fontWeight:600,fontSize:10,padding:"6px 10px",borderRadius:6,background:"#EFF6FF",color:"#2563EB"}}>{i.type.toUpperCase()}</div><div style={{flex:1}}><div style={{fontSize:13,fontWeight:500}}>{i.name}</div><div style={{fontSize:11,color:"#8A8680"}}>{(i.content||"").length.toLocaleString()} chars</div></div><button onClick={()=>rm(i._id)} style={{width:26,height:26,borderRadius:6,border:"1px solid #E6E3DC",background:"transparent",fontSize:11,color:"#E11D48",display:"flex",alignItems:"center",justifyContent:"center"}}>x</button></div>))}</div>}
</div>)}

function ChV({agent,rl}){const[cfg,setCfg]=useState(null);const[chTab,setChTab]=useState("website");const[pid,setPid]=useState("");const[bid,setBid]=useState("");const[tk,setTk]=useState("");const[show,setShow]=useState(false);const[tst,setTst]=useState(null);const[sav,setSav]=useState(false);
useEffect(()=>{lc()},[agent._id]);async function lc(){const d=await api("/api/channels/"+agent._id);if(!d.error)setCfg(d)}
async function enableWeb(){setSav(true);const d=await api("/api/channels/"+agent._id+"/website/enable",{method:"POST",body:JSON.stringify({brandColor:agent.color||"#2563EB"})});setSav(false);if(d.success){lc();rl()}}
async function toggleWebLive(){await api("/api/channels/"+agent._id+"/website/toggle-live",{method:"POST"});lc();rl()}
async function connectWA(){if(!pid||!tk)return;setSav(true);await api("/api/channels/"+agent._id+"/whatsapp/connect",{method:"POST",body:JSON.stringify({phoneNumberId:pid,businessAccountId:bid,accessToken:tk})});setSav(false);lc();rl()}
async function testWA(){setTst("testing");const d=await api("/api/channels/"+agent._id+"/whatsapp/test",{method:"POST"});setTst(d.success?"ok":"err");setTimeout(()=>setTst(null),3000)}
async function toggleWALive(){await api("/api/channels/"+agent._id+"/whatsapp/toggle-live",{method:"POST"});lc();rl()}

const web=cfg?.website||{};const wa=cfg?.whatsapp||{};

return(<div style={{padding:"24px 28px",maxWidth:960}}><h1 style={{fontSize:24,fontWeight:700,marginBottom:4}}>Channels</h1><p style={{fontSize:13,color:"#8A8680",marginBottom:24}}>Connect {agent.name} to channels</p>
<div style={{display:"flex",gap:8,marginBottom:24}}>{[["website","Website Chatbot"],["whatsapp","WhatsApp"],["rcs","RCS"]].map(([id,l])=>(<button key={id} onClick={()=>setChTab(id)} style={{padding:"9px 20px",borderRadius:8,fontSize:13,fontWeight:chTab===id?600:500,border:"1.5px solid "+(chTab===id?"#2563EB":"#E6E3DC"),background:chTab===id?"#EFF6FF":"#fff",color:chTab===id?"#2563EB":"#3D3A34"}}>{l}</button>))}</div>

{chTab==="website"&&<div style={{display:"flex",flexDirection:"column",gap:16}}>
<div style={{background:web.enabled?"#ECFDF5":"#EFF6FF",border:"1px solid "+(web.enabled?"#A7F3D0":"#BFDBFE"),borderRadius:12,padding:"14px 18px",display:"flex",alignItems:"center",justifyContent:"space-between"}}><div><div style={{fontSize:13,fontWeight:600,color:web.enabled?"#065F46":"#1E40AF"}}>{web.enabled?"Website Chatbot Enabled":"Enable Website Chatbot"}</div><div style={{fontSize:11,color:web.enabled?"#047857":"#3B82F6",marginTop:2}}>{web.enabled?"Embed script ready":"One click to get your embed code"}</div></div>
{web.enabled?<div onClick={toggleWebLive} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}><span style={{fontSize:12,fontWeight:600,color:web.live?"#059669":"#8A8680"}}>{web.live?"Live":"Test"}</span><div style={{width:40,height:22,borderRadius:11,background:web.live?"#059669":"#E6E3DC",padding:2,transition:"all .25s"}}><div style={{width:18,height:18,borderRadius:9,background:"#fff",transition:"transform .25s",transform:web.live?"translateX(18px)":"translateX(0)"}}/></div></div>:<button onClick={enableWeb} disabled={sav} style={{...bp,fontSize:12,padding:"8px 18px"}}>{sav?"Enabling...":"Enable"}</button>}</div>
{web.enabled&&web.embedScript&&<div style={{background:"#fff",borderRadius:12,border:"1px solid #E6E3DC",padding:22}}>
<h3 style={{fontSize:15,fontWeight:600,marginBottom:12}}>Embed Code</h3>
<p style={{fontSize:12,color:"#8A8680",marginBottom:14}}>Add this script tag to your website, just before the closing body tag.</p>
<div style={{background:"#141210",borderRadius:8,padding:16,fontFamily:"'IBM Plex Mono'",fontSize:12,color:"#A7F3D0",lineHeight:1.6,wordBreak:"break-all"}}>{web.embedScript}</div>
<button onClick={()=>{navigator.clipboard.writeText(web.embedScript||"")}} style={{...bs,marginTop:12}}>Copy to Clipboard</button>
</div>}
</div>}

{chTab==="whatsapp"&&<div style={{display:"flex",flexDirection:"column",gap:16}}>
<div style={{background:wa.enabled?"#ECFDF5":"#FFFBEB",border:"1px solid "+(wa.enabled?"#A7F3D0":"#FDE68A"),borderRadius:12,padding:"14px 18px",display:"flex",alignItems:"center",justifyContent:"space-between"}}><div><div style={{fontSize:13,fontWeight:600,color:wa.enabled?"#065F46":"#92400E"}}>{wa.enabled?"WhatsApp Connected":"Not Connected"}</div></div>
{wa.enabled&&<div onClick={toggleWALive} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}><span style={{fontSize:12,fontWeight:600,color:wa.live?"#059669":"#8A8680"}}>{wa.live?"Live":"Test"}</span><div style={{width:40,height:22,borderRadius:11,background:wa.live?"#059669":"#E6E3DC",padding:2,transition:"all .25s"}}><div style={{width:18,height:18,borderRadius:9,background:"#fff",transition:"transform .25s",transform:wa.live?"translateX(18px)":"translateX(0)"}}/></div></div>}</div>
<div style={{background:"#fff",borderRadius:12,border:"1px solid #E6E3DC",padding:22}}><h3 style={{fontSize:15,fontWeight:600,marginBottom:14}}>Meta API Credentials</h3>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}><div><label style={lbl}>Phone Number ID</label><input value={pid} onChange={e=>setPid(e.target.value)} placeholder="100234567890" style={inp}/></div><div><label style={lbl}>Business Account ID</label><input value={bid} onChange={e=>setBid(e.target.value)} placeholder="109876543210" style={inp}/></div></div>
<div style={{marginBottom:14}}><label style={lbl}>Access Token</label><div style={{display:"flex",gap:6}}><input value={tk} onChange={e=>setTk(e.target.value)} type={show?"text":"password"} placeholder="EAAxxxxxxxxxx..." style={{...inp,flex:1}}/><button onClick={()=>setShow(!show)} style={{...bo,padding:"6px 12px",fontSize:11}}>{show?"Hide":"Show"}</button></div></div>
<button onClick={connectWA} disabled={sav} style={bp}>{sav?"Saving...":"Save Credentials"}</button></div>
{wa.enabled&&<div style={{background:"#fff",borderRadius:12,border:"1px solid #E6E3DC",padding:22}}><h3 style={{fontSize:15,fontWeight:600,marginBottom:12}}>Webhook</h3>
<div style={{marginBottom:10}}><label style={lbl}>Callback URL</label><div style={{padding:"9px 14px",background:"#FAFAF8",border:"1px solid #E6E3DC",borderRadius:8,fontSize:12,fontFamily:"'IBM Plex Mono'",wordBreak:"break-all"}}>{wa.webhookUrl||"Deploy backend first"}</div></div>
<div><label style={lbl}>Verify Token</label><div style={{padding:"9px 14px",background:"#FAFAF8",border:"1px solid #E6E3DC",borderRadius:8,fontSize:12,fontFamily:"'IBM Plex Mono'"}}>{wa.webhookVerifyToken||"Connect first"}</div></div></div>}
{wa.enabled&&<button onClick={testWA} style={{...bp,background:tst==="ok"?"#059669":tst==="err"?"#E11D48":"#2563EB",alignSelf:"flex-start"}}>{tst==="testing"?"Testing...":tst==="ok"?"Connected":tst==="err"?"Failed":"Test Connection"}</button>}
</div>}

{chTab==="rcs"&&<div style={{background:"#fff",borderRadius:12,border:"1px solid #E6E3DC",padding:28,textAlign:"center"}}><div style={{fontFamily:"'IBM Plex Mono'",fontSize:24,color:"#B5B1AA",marginBottom:12}}>RCS</div><h3 style={{fontSize:16,fontWeight:600,marginBottom:6}}>RCS Business Messaging</h3><p style={{fontSize:13,color:"#8A8680"}}>Coming soon. Contact us for early access.</p></div>}
</div>)}

function SV({agent,rl}){const[name,setName]=useState(agent.name);const[prompt,setPrompt]=useState(agent.prompt);const[saved,setSaved]=useState(false);useEffect(()=>{setName(agent.name);setPrompt(agent.prompt)},[agent._id]);
async function save(){await api("/api/agents/"+agent._id,{method:"PUT",body:JSON.stringify({name,prompt})});setSaved(true);rl();setTimeout(()=>setSaved(false),2000)}
return(<div style={{padding:"24px 28px",maxWidth:960}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:24}}><div><h1 style={{fontSize:24,fontWeight:700,marginBottom:4}}>Settings</h1><p style={{fontSize:13,color:"#8A8680"}}>{agent.name}</p></div><button onClick={save} style={{...bp,background:saved?"#059669":"#2563EB"}}>{saved?"Saved":"Save Changes"}</button></div>
<div style={{display:"grid",gridTemplateColumns:"1fr 280px",gap:20}}>
<div><div style={{marginBottom:18}}><label style={lbl}>Agent Name</label><input value={name} onChange={e=>setName(e.target.value)} style={inp}/></div><div><label style={lbl}>System Prompt</label><textarea value={prompt} onChange={e=>setPrompt(e.target.value)} rows={16} style={{...inp,fontFamily:"'IBM Plex Mono'",fontSize:12,resize:"vertical",lineHeight:1.7}}/></div></div>
<div style={{background:"#FFFBEB",border:"1px solid #FDE68A",borderRadius:12,padding:18,height:"fit-content"}}><h4 style={{fontSize:13,fontWeight:600,color:"#92400E",marginBottom:10}}>Prompt Tips</h4><div style={{fontSize:12,color:"#92400E",lineHeight:1.9}}><p>Define role and company</p><p>List capabilities</p><p>Set tone and guardrails</p><p>Add sample data</p><p>Specify escalation rules</p></div></div>
</div></div>)}

function StV({agent}){const s=agent.stats||{};return(<div style={{padding:"24px 28px",maxWidth:960}}><h1 style={{fontSize:24,fontWeight:700,marginBottom:4}}>Analytics</h1><p style={{fontSize:13,color:"#8A8680",marginBottom:24}}>{agent.name}</p><div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14}}>{[{l:"Conversations",v:s.totalConversations||0,c:"#2563EB"},{l:"Messages",v:s.totalMessages||0,c:"#0D9488"},{l:"Avg Response",v:(s.avgResponseTime||0)+"ms",c:"#D97706"},{l:"Resolution",v:"89%",c:"#059669"}].map((x,i)=>(<div key={i} style={{background:"#fff",borderRadius:12,border:"1px solid #E6E3DC",padding:20,textAlign:"center"}}><div style={{fontSize:24,fontWeight:700,fontFamily:"'IBM Plex Mono'",color:x.c}}>{x.v}</div><div style={{fontSize:12,color:"#8A8680",marginTop:4}}>{x.l}</div></div>))}</div></div>)}

function Mod({children,onClose,title}){return(<div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(20,18,16,.4)",backdropFilter:"blur(6px)",display:"flex",justifyContent:"center",alignItems:"center",zIndex:2000,padding:20}}><div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:16,boxShadow:"0 16px 48px rgba(0,0,0,.12)",width:"100%",maxWidth:480,padding:24}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><h2 style={{fontSize:18,fontWeight:700}}>{title}</h2><button onClick={onClose} style={{width:28,height:28,borderRadius:6,border:"1px solid #E6E3DC",background:"transparent",fontSize:13,color:"#8A8680",display:"flex",alignItems:"center",justifyContent:"center"}}>x</button></div>{children}</div></div>)}
function Card({t,children}){return(<div style={{background:"#fff",borderRadius:12,border:"1px solid #E6E3DC",padding:18}}><h3 style={{fontSize:13,fontWeight:600,marginBottom:10}}>{t}</h3>{children}</div>)}

const bp={background:"#2563EB",color:"#fff",border:"none",padding:"9px 20px",borderRadius:8,fontSize:13,fontWeight:600,whiteSpace:"nowrap"};
const bs={background:"#EFF6FF",color:"#2563EB",border:"none",padding:"7px 16px",borderRadius:7,fontSize:12,fontWeight:600};
const bo={background:"#fff",color:"#3D3A34",border:"1.5px solid #E6E3DC",padding:"7px 16px",borderRadius:7,fontSize:12,fontWeight:500};
const inp={width:"100%",padding:"10px 14px",border:"1.5px solid #E6E3DC",borderRadius:8,fontSize:13,fontFamily:"'Sora'",outline:"none",background:"#FAFAF8"};
const lbl={fontSize:11,fontWeight:600,color:"#3D3A34",display:"block",marginBottom:5};
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
