<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgntPro.ai — Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body, #root { height: 100%; overflow: hidden; }
  body { font-family: 'Outfit', sans-serif; background: #F8F7FC; color: #1A1035; -webkit-font-smoothing: antialiased; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-5px); opacity: 1; } }
  * { scrollbar-width: thin; scrollbar-color: #E8E5F0 transparent; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #E8E5F0; border-radius: 3px; }
  input:focus, textarea:focus { border-color: #8B5CF6 !important; outline: none; }
  button { font-family: 'Outfit', sans-serif; }
  button:hover { opacity: 0.92; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

// ============================================================
// PRESET AGENTS
// ============================================================
const PRESET_AGENTS = {
  ecommerce: {
    name: "ShopEase Support",
    prompt: "You are ShopEase's AI customer support agent on WhatsApp. You help customers with:\n- Order tracking and status updates\n- Returns and refund processing\n- Product recommendations based on preferences\n- Size/color availability checks\n- Delivery time estimates\n- Complaint resolution\n\nTone: Friendly, efficient, empathetic. Use emojis sparingly. Keep responses concise for WhatsApp.\nRules: Never share other customer data. Escalate billing disputes over ₹5000 to human agents. Always confirm order IDs before sharing details.\n\nSample product catalog:\n- Classic White Sneakers (SKU: SNK-001) — ₹2,499, sizes 6-12\n- Denim Jacket (SKU: JKT-042) — ₹3,299, S/M/L/XL\n- Wireless Earbuds Pro (SKU: AUD-015) — ₹1,899\n- Yoga Mat Premium (SKU: FIT-008) — ₹999\n\nOrder statuses: Use realistic Indian city names and delivery timelines (2-5 business days).",
    channel: "whatsapp", avatar: "🛍️", color: "#8B5CF6"
  },
  bfsi: {
    name: "QuickLoan Advisor",
    prompt: "You are QuickLoan's AI advisor on WhatsApp. You help users with:\n- Home loan eligibility checks based on income\n- EMI calculations and comparisons\n- Document requirements for loan applications\n- Application status tracking\n- Interest rate information\n\nTone: Professional yet approachable. Use clear numbers and breakdowns.\nRules: Never guarantee loan approval. Always mention that final approval depends on verification. Comply with RBI guidelines.",
    channel: "whatsapp", avatar: "🏦", color: "#3B82F6"
  },
  insurance: {
    name: "SecureLife Agent",
    prompt: "You are SecureLife's insurance advisor on WhatsApp. You help with:\n- Plan comparisons (Essential ₹499/mo, Premium ₹899/mo, Family ₹1299/mo)\n- Claim filing assistance\n- Policy renewal reminders\n- Coverage explanations\n- Hospital network queries\n\nTone: Reassuring, clear, patient. Break down complex terms simply.\nRules: Never provide medical advice. Always recommend consulting a doctor for health queries.",
    channel: "whatsapp", avatar: "🛡️", color: "#10B981"
  }
};

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const [currentView, setCurrentView] = useState("agents");
  const [agents, setAgents] = useState([
    { id: "agent-1", ...PRESET_AGENTS.ecommerce, knowledgeBase: [], conversations: [], createdAt: Date.now() },
  ]);
  const [activeAgentId, setActiveAgentId] = useState("agent-1");
  const [showCreateModal, setShowCreateModal] = useState(false);
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);

  const activeAgent = agents.find(a => a.id === activeAgentId);

  function updateAgent(id, updates) {
    setAgents(prev => prev.map(a => a.id === id ? { ...a, ...updates } : a));
  }

  function createAgent(preset) {
    const data = PRESET_AGENTS[preset] || PRESET_AGENTS.ecommerce;
    const newAgent = { id: "agent-" + Date.now(), ...data, knowledgeBase: [], conversations: [], createdAt: Date.now() };
    setAgents(prev => [...prev, newAgent]);
    setActiveAgentId(newAgent.id);
    setShowCreateModal(false);
    setCurrentView("chat");
  }

  function deleteAgent(id) {
    if (agents.length <= 1) return;
    setAgents(prev => prev.filter(a => a.id !== id));
    if (activeAgentId === id) setActiveAgentId(agents.find(a => a.id !== id)?.id);
  }

  const sw = sidebarCollapsed ? 68 : 260;

  return (
    <div style={{ display: "flex", height: "100vh", overflow: "hidden", background: "#F8F7FC" }}>
      {/* SIDEBAR */}
      <div style={{ width: sw, minWidth: sw, background: "#fff", borderRight: "1px solid #E8E5F0", display: "flex", flexDirection: "column", transition: "all 0.25s", overflow: "hidden", flexShrink: 0 }}>
        <div style={{ padding: 16, display: "flex", alignItems: "center", justifyContent: "space-between", borderBottom: "1px solid #F0EEF5", minHeight: 60 }}>
          {!sidebarCollapsed && (
            <a href="index.html" style={{ display: "flex", alignItems: "center", gap: 7, textDecoration: "none" }}>
              <div style={{ width: 28, height: 28, borderRadius: 8, background: "#8B5CF6", color: "#fff", fontSize: 13, fontWeight: 800, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'JetBrains Mono', monospace" }}>A</div>
              <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 16, fontWeight: 700, color: "#1A1035", letterSpacing: -0.5 }}>AgntPro<span style={{ color: "#8B5CF6" }}>.ai</span></span>
            </a>
          )}
          <button onClick={() => setSidebarCollapsed(!sidebarCollapsed)} style={{ width: 28, height: 28, borderRadius: 6, border: "1px solid #E8E5F0", background: "transparent", cursor: "pointer", fontSize: 12, color: "#8E87A5", display: "flex", alignItems: "center", justifyContent: "center" }}>
            {sidebarCollapsed ? "→" : "←"}
          </button>
        </div>

        <div style={{ padding: "12px 8px", display: "flex", flexDirection: "column", gap: 2 }}>
          {[
            { id: "agents", icon: "🤖", label: "My Agents" },
            { id: "chat", icon: "💬", label: "Test Chat" },
            { id: "knowledge", icon: "📚", label: "Knowledge Base" },
            { id: "channels", icon: "📡", label: "Channels" },
            { id: "settings", icon: "⚙️", label: "Agent Config" },
            { id: "analytics", icon: "📊", label: "Analytics" },
          ].map(item => (
            <button key={item.id} onClick={() => setCurrentView(item.id)} title={item.label}
              style={{ display: "flex", alignItems: "center", gap: 10, border: "none", borderRadius: 8, cursor: "pointer", fontSize: 14, fontWeight: currentView === item.id ? 600 : 500, color: currentView === item.id ? "#8B5CF6" : "#4A4362", background: currentView === item.id ? "#F0EDFF" : "transparent", padding: sidebarCollapsed ? 12 : "10px 16px", justifyContent: sidebarCollapsed ? "center" : "flex-start", transition: "all 0.15s", textAlign: "left", fontFamily: "'Outfit', sans-serif" }}>
              <span style={{ fontSize: 18 }}>{item.icon}</span>
              {!sidebarCollapsed && <span style={{ whiteSpace: "nowrap" }}>{item.label}</span>}
            </button>
          ))}
        </div>

        {!sidebarCollapsed && (
          <div style={{ flex: 1, padding: "12px 8px", borderTop: "1px solid #F0EEF5", overflow: "auto" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "4px 8px", marginBottom: 8 }}>
              <span style={{ fontSize: 10, fontWeight: 700, color: "#C4BED6", letterSpacing: 1.5, fontFamily: "'JetBrains Mono', monospace" }}>AGENTS</span>
              <button onClick={() => setShowCreateModal(true)} style={{ width: 22, height: 22, borderRadius: 6, border: "1px solid #E8E5F0", background: "transparent", cursor: "pointer", fontSize: 14, color: "#8B5CF6", display: "flex", alignItems: "center", justifyContent: "center" }}>+</button>
            </div>
            {agents.map(agent => (
              <button key={agent.id} onClick={() => { setActiveAgentId(agent.id); setCurrentView("chat"); }}
                style={{ display: "flex", alignItems: "center", gap: 10, width: "100%", padding: "10px 12px", border: "none", borderRadius: 10, background: activeAgentId === agent.id ? "#F0EDFF" : "transparent", cursor: "pointer", textAlign: "left", fontFamily: "'Outfit', sans-serif" }}>
                <span style={{ fontSize: 20 }}>{agent.avatar}</span>
                <div style={{ flex: 1, display: "flex", flexDirection: "column" }}>
                  <span style={{ fontSize: 13, fontWeight: 600, color: "#1A1035" }}>{agent.name}</span>
                  <span style={{ fontSize: 11, color: "#8E87A5" }}>{agent.knowledgeBase.length} KB items</span>
                </div>
                <div style={{ width: 8, height: 8, borderRadius: "50%", background: "#10B981", flexShrink: 0 }} />
              </button>
            ))}
          </div>
        )}
      </div>

      {/* MAIN */}
      <div style={{ flex: 1, overflow: "auto" }}>
        {currentView === "agents" && <AgentsView agents={agents} activeAgentId={activeAgentId} onSelect={id => { setActiveAgentId(id); setCurrentView("chat"); }} onCreate={() => setShowCreateModal(true)} onDelete={deleteAgent} />}
        {currentView === "chat" && activeAgent && <ChatView agent={activeAgent} updateAgent={updateAgent} />}
        {currentView === "knowledge" && activeAgent && <KnowledgeBaseView agent={activeAgent} updateAgent={updateAgent} />}
        {currentView === "channels" && activeAgent && <ChannelsView agent={activeAgent} updateAgent={updateAgent} />}
        {currentView === "settings" && activeAgent && <SettingsView agent={activeAgent} updateAgent={updateAgent} />}
        {currentView === "analytics" && activeAgent && <AnalyticsView agent={activeAgent} />}
      </div>

      {showCreateModal && (
        <Modal onClose={() => setShowCreateModal(false)} title="Create New Agent">
          <p style={{ fontSize: 14, color: "#8E87A5", marginBottom: 24 }}>Choose a template to get started quickly.</p>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12 }}>
            {Object.entries(PRESET_AGENTS).map(([key, preset]) => (
              <button key={key} onClick={() => createAgent(key)} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 10, padding: "24px 16px", border: "1.5px solid #E8E5F0", borderRadius: 14, background: "#fff", cursor: "pointer", fontFamily: "'Outfit', sans-serif", transition: "all 0.15s" }}>
                <span style={{ fontSize: 32 }}>{preset.avatar}</span>
                <span style={{ fontSize: 13, fontWeight: 600, color: "#1A1035" }}>{preset.name}</span>
                <span style={{ fontSize: 10, fontWeight: 700, color: "#8B5CF6", letterSpacing: 1, fontFamily: "'JetBrains Mono', monospace" }}>{key.toUpperCase()}</span>
              </button>
            ))}
          </div>
        </Modal>
      )}
    </div>
  );
}

// ============================================================
// AGENTS VIEW
// ============================================================
function AgentsView({ agents, activeAgentId, onSelect, onCreate, onDelete }) {
  return (
    <div style={{ padding: "28px 32px", maxWidth: 1200 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 28 }}>
        <div>
          <h1 style={{ fontSize: 26, fontWeight: 700, letterSpacing: -0.5, marginBottom: 4 }}>My Agents</h1>
          <p style={{ fontSize: 14, color: "#8E87A5" }}>Manage your AI-powered conversational agents</p>
        </div>
        <button onClick={onCreate} style={btnPrimary}>+ Create Agent</button>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(320px, 1fr))", gap: 20 }}>
        {agents.map(agent => (
          <div key={agent.id} style={{ background: "#fff", borderRadius: 16, border: `1.5px solid ${activeAgentId === agent.id ? "#8B5CF6" : "#E8E5F0"}`, padding: 24 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 16 }}>
              <div style={{ width: 50, height: 50, borderRadius: 14, background: (agent.color || "#8B5CF6") + "15", display: "flex", alignItems: "center", justifyContent: "center" }}>
                <span style={{ fontSize: 28 }}>{agent.avatar}</span>
              </div>
              <div style={{ flex: 1 }}>
                <h3 style={{ fontSize: 17, fontWeight: 600 }}>{agent.name}</h3>
                <span style={{ fontSize: 12, color: "#8E87A5" }}>📱 {agent.channel || "whatsapp"}</span>
              </div>
              <div style={{ padding: "4px 10px", borderRadius: 20, fontSize: 11, fontWeight: 600, background: "#ECFDF5", color: "#10B981" }}>Active</div>
            </div>
            <p style={{ fontSize: 13, color: "#8E87A5", lineHeight: 1.6, marginBottom: 16 }}>{agent.prompt.slice(0, 120)}...</p>
            <div style={{ display: "flex", gap: 24, marginBottom: 16, paddingTop: 16, borderTop: "1px solid #F0EEF5" }}>
              <div><span style={{ fontSize: 20, fontWeight: 700, fontFamily: "'JetBrains Mono'" }}>{agent.knowledgeBase?.length || 0}</span><br/><span style={{ fontSize: 11, color: "#8E87A5" }}>KB Items</span></div>
              <div><span style={{ fontSize: 20, fontWeight: 700, fontFamily: "'JetBrains Mono'" }}>{agent.conversations?.length || 0}</span><br/><span style={{ fontSize: 11, color: "#8E87A5" }}>Chats</span></div>
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => onSelect(agent.id)} style={btnSecondary}>Test Chat →</button>
              {agents.length > 1 && <button onClick={() => onDelete(agent.id)} style={{ ...btnSecondary, background: "#FFF1F2", color: "#F43F5E" }}>Delete</button>}
            </div>
          </div>
        ))}
        <button onClick={onCreate} style={{ background: "#fff", borderRadius: 16, border: "2px dashed #E8E5F0", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: 200, cursor: "pointer", gap: 8 }}>
          <span style={{ fontSize: 36, color: "#C4BED6" }}>+</span>
          <span style={{ fontSize: 14, color: "#8E87A5", fontWeight: 500 }}>Create New Agent</span>
        </button>
      </div>
    </div>
  );
}

// ============================================================
// CHAT VIEW — Claude API
// ============================================================
function ChatView({ agent, updateAgent }) {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [isLoading, setIsLoading] = useState(false);
  const [sessionStarted, setSessionStarted] = useState(false);
  const chatRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => { if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight; }, [messages]);

  function buildSystemPrompt() {
    let kb = "";
    if (agent.knowledgeBase && agent.knowledgeBase.length > 0) {
      kb = "\n\n--- KNOWLEDGE BASE ---\n";
      agent.knowledgeBase.forEach(item => { kb += "\n[" + item.type.toUpperCase() + ": " + item.name + "]\n" + item.content + "\n"; });
      kb += "\n--- END KNOWLEDGE BASE ---\nUse the knowledge base above to answer questions accurately. If the answer is in the knowledge base, cite it.";
    }
    return agent.prompt + kb;
  }

  async function sendMessage() {
    if (!input.trim() || isLoading) return;
    const userMsg = input.trim();
    setInput("");
    setSessionStarted(true);
    const newMsgs = [...messages, { role: "user", content: userMsg }];
    setMessages(newMsgs);
    setIsLoading(true);

    try {
      const apiMsgs = newMsgs.map(m => ({ role: m.role, content: m.content }));
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, system: buildSystemPrompt(), messages: apiMsgs })
      });
      const data = await resp.json();
      let text = "";
      if (data.content) data.content.forEach(b => { if (b.type === "text") text += b.text; });
      if (!text) text = "Sorry, I couldn't process that. Please try again.";
      setMessages(prev => [...prev, { role: "assistant", content: text }]);
    } catch (err) {
      setMessages(prev => [...prev, { role: "assistant", content: "Connection error. Please check your setup and try again." }]);
    }
    setIsLoading(false);
    if (inputRef.current) inputRef.current.focus();
  }

  const quickPrompts = ["Where is my order #12345?", "I want to return a product", "What sizes do you have for sneakers?", "My delivery is late, help!"];

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100vh" }}>
      {/* Top Bar */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "16px 28px", background: "#fff", borderBottom: "1px solid #E8E5F0" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <span style={{ fontSize: 24 }}>{agent.avatar}</span>
          <div>
            <h2 style={{ fontSize: 16, fontWeight: 600, margin: 0 }}>{agent.name}</h2>
            <span style={{ fontSize: 12, color: "#8E87A5" }}><span style={{ width: 7, height: 7, borderRadius: "50%", background: "#10B981", display: "inline-block", marginRight: 6 }}></span>Active · WhatsApp Business API</span>
          </div>
        </div>
        <button onClick={() => { setMessages([]); setSessionStarted(false); }} style={btnOutline}>Clear Chat</button>
      </div>

      <div style={{ flex: 1, display: "flex", overflow: "hidden", padding: 24, gap: 24 }}>
        {/* Phone */}
        <div style={{ display: "flex", justifyContent: "center", alignItems: "flex-start" }}>
          <div style={{ width: 340, background: "#1A1035", borderRadius: 40, padding: 10, boxShadow: "0 20px 60px rgba(26,16,53,0.2)", position: "relative", flexShrink: 0 }}>
            <div style={{ width: 120, height: 26, background: "#1A1035", borderRadius: "0 0 16px 16px", position: "absolute", top: 0, left: "50%", transform: "translateX(-50%)", zIndex: 5 }} />
            <div style={{ background: "#fff", borderRadius: 32, overflow: "hidden", display: "flex", flexDirection: "column", height: 600 }}>
              {/* Phone Header */}
              <div style={{ background: "#fff" }}>
                <div style={{ display: "flex", justifyContent: "space-between", padding: "12px 20px 4px", fontSize: 12, fontWeight: 600, color: "#1A1035" }}>
                  <span>9:41</span><span>5G ●●●</span>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 14px 10px", borderBottom: "1px solid #F0EEF5" }}>
                  <span style={{ fontSize: 18, color: "#8B5CF6" }}>‹</span>
                  <div style={{ width: 34, height: 34, borderRadius: "50%", background: (agent.color || "#8B5CF6") + "20", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>{agent.avatar}</div>
                  <div>
                    <div style={{ fontSize: 14, fontWeight: 600 }}>{agent.name}</div>
                    <div style={{ fontSize: 11, color: "#10B981" }}>online</div>
                  </div>
                </div>
              </div>

              {/* Chat Body */}
              <div ref={chatRef} style={{ flex: 1, overflowY: "auto", padding: 14, display: "flex", flexDirection: "column", gap: 8, background: "#FAFBFD" }}>
                {!sessionStarted && (
                  <div style={{ textAlign: "center", padding: "30px 16px" }}>
                    <div style={{ fontSize: 40, marginBottom: 12 }}>{agent.avatar}</div>
                    <h3 style={{ fontSize: 16, fontWeight: 600, marginBottom: 6 }}>{agent.name}</h3>
                    <p style={{ fontSize: 13, color: "#8E87A5", lineHeight: 1.5, maxWidth: 250, margin: "0 auto 20px" }}>Start a conversation to test your agent.</p>
                    <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                      {quickPrompts.map((q, i) => (
                        <button key={i} onClick={() => setInput(q)} style={{ background: "#fff", border: "1px solid #E8E5F0", borderRadius: 10, padding: "8px 14px", fontSize: 12, color: "#4A4362", cursor: "pointer", textAlign: "left", fontFamily: "'Outfit', sans-serif" }}>{q}</button>
                      ))}
                    </div>
                  </div>
                )}
                {messages.map((msg, i) => (
                  <div key={i} style={{ maxWidth: "80%", padding: "10px 14px", borderRadius: 16, fontSize: 13, lineHeight: 1.55, whiteSpace: "pre-line", animation: "fadeIn 0.25s ease", alignSelf: msg.role === "user" ? "flex-end" : "flex-start", background: msg.role === "user" ? "#8B5CF6" : "#fff", color: msg.role === "user" ? "#fff" : "#1A1035", borderBottomRightRadius: msg.role === "user" ? 4 : 16, borderBottomLeftRadius: msg.role === "assistant" ? 4 : 16, border: msg.role === "assistant" ? "1px solid #EEEAF5" : "none", fontWeight: msg.role === "user" ? 500 : 400 }}>
                    {msg.content}
                  </div>
                ))}
                {isLoading && (
                  <div style={{ alignSelf: "flex-start", background: "#fff", border: "1px solid #EEEAF5", borderRadius: 16, borderBottomLeftRadius: 4, padding: "14px 18px", display: "flex", gap: 4, alignItems: "center" }}>
                    <span style={{ width: 7, height: 7, borderRadius: "50%", background: "#C4BED6", animation: "bounce 1.2s ease-in-out infinite", display: "inline-block" }} />
                    <span style={{ width: 7, height: 7, borderRadius: "50%", background: "#C4BED6", animation: "bounce 1.2s ease-in-out 0.15s infinite", display: "inline-block" }} />
                    <span style={{ width: 7, height: 7, borderRadius: "50%", background: "#C4BED6", animation: "bounce 1.2s ease-in-out 0.3s infinite", display: "inline-block" }} />
                  </div>
                )}
              </div>

              {/* Input */}
              <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "10px 12px", borderTop: "1px solid #F0EEF5", background: "#fff" }}>
                <input ref={inputRef} value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => { if (e.key === "Enter") sendMessage(); }} placeholder="Type a message..." style={{ flex: 1, border: "1.5px solid #E8E5F0", borderRadius: 20, padding: "9px 14px", fontSize: 13, fontFamily: "'Outfit', sans-serif", background: "#FAFBFD", outline: "none" }} />
                <button onClick={sendMessage} disabled={!input.trim() || isLoading} style={{ width: 34, height: 34, borderRadius: "50%", background: "#8B5CF6", border: "none", color: "#fff", fontSize: 15, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, opacity: input.trim() ? 1 : 0.4 }}>↑</button>
              </div>
            </div>
          </div>
        </div>

        {/* Side Panel */}
        <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 16, overflow: "auto", minWidth: 280, maxWidth: 340 }}>
          <div style={cardStyle}>
            <h3 style={cardTitle}>Agent Prompt</h3>
            <div style={{ fontSize: 12, color: "#8E87A5", lineHeight: 1.6, background: "#FAFBFD", borderRadius: 8, padding: 12, border: "1px solid #F0EEF5", maxHeight: 140, overflow: "hidden" }}>{agent.prompt.slice(0, 300)}...</div>
          </div>
          <div style={cardStyle}>
            <h3 style={cardTitle}>Knowledge Base</h3>
            {agent.knowledgeBase.length === 0
              ? <p style={{ fontSize: 13, color: "#8E87A5", lineHeight: 1.6 }}>No documents added yet. Add PDFs or URLs to make your agent smarter.</p>
              : agent.knowledgeBase.map((item, i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0", borderBottom: "1px solid #F0EEF5" }}>
                  <span style={{ fontSize: 16 }}>{item.type === "pdf" ? "📄" : "🌐"}</span>

    </div>

}

// ============================================================
// KNOWLEDGE BASE VIEW
// ============================================================
function KnowledgeBaseView({ agent, updateAgent }) {
  const [urlInput, setUrlInput] = useState("");
  const [urlLoading, setUrlLoading] = useState(false);
  const [textInput, setTextInput] = useState("");
  const [textName, setTextName] = useState("");
  const [activeTab, setActiveTab] = useState("pdf");
  const fileRef = useRef(null);

  async function handlePDF(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async function(ev) {
      const base64 = ev.target.result.split(",")[1];
      try {
        const resp = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, messages: [{ role: "user", content: [{ type: "document", source: { type: "base64", media_type: "application/pdf", data: base64 } }, { type: "text", text: "Extract all text content from this PDF. Return only the raw text." }] }] })
        });
        const data = await resp.json();
        let txt = "";
        if (data.content) data.content.forEach(b => { if (b.type === "text") txt += b.text; });
        updateAgent(agent.id, { knowledgeBase: [...(agent.knowledgeBase || []), { id: "kb-" + Date.now(), type: "pdf", name: file.name, content: txt || "Could not extract.", addedAt: Date.now() }] });
      } catch (err) { console.error(err); }
    };
    reader.readAsDataURL(file);
  }

  async function handleURL() {
    if (!urlInput.trim()) return;
    setUrlLoading(true);
    try {
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, tools: [{ type: "web_search_20250305", name: "web_search" }], messages: [{ role: "user", content: "Search and summarize all key content from: " + urlInput + ". Extract product details, policies, FAQs, etc." }] })
      });
      const data = await resp.json();
      let txt = "";
      if (data.content) data.content.forEach(b => { if (b.type === "text") txt += b.text; });
      updateAgent(agent.id, { knowledgeBase: [...(agent.knowledgeBase || []), { id: "kb-" + Date.now(), type: "url", name: urlInput, content: txt || "Could not extract.", addedAt: Date.now() }] });
      setUrlInput("");
    } catch (err) { console.error(err); }
    setUrlLoading(false);
  }

  function handleText() {
    if (!textInput.trim() || !textName.trim()) return;
    updateAgent(agent.id, { knowledgeBase: [...(agent.knowledgeBase || []), { id: "kb-" + Date.now(), type: "text", name: textName, content: textInput, addedAt: Date.now() }] });
    setTextInput(""); setTextName("");
  }

  function removeKB(id) {
    updateAgent(agent.id, { knowledgeBase: (agent.knowledgeBase || []).filter(k => k.id !== id) });
  }

  const tabs = [{ id: "pdf", icon: "📄", label: "Upload PDF" }, { id: "url", icon: "🌐", label: "Scrape URL" }, { id: "text", icon: "📝", label: "Paste Text" }];

  return (
    <div style={{ padding: "28px 32px", maxWidth: 900 }}>
      <div style={{ marginBottom: 28 }}>
        <h1 style={{ fontSize: 26, fontWeight: 700, letterSpacing: -0.5, marginBottom: 4 }}>Knowledge Base</h1>
        <p style={{ fontSize: 14, color: "#8E87A5" }}>Add documents and URLs to make <strong>{agent.name}</strong> smarter</p>
      </div>

      <div style={{ display: "flex", gap: 8, marginBottom: 24 }}>
        {tabs.map(tab => (
          <button key={tab.id} onClick={() => setActiveTab(tab.id)} style={{ display: "flex", alignItems: "center", gap: 6, padding: "10px 20px", borderRadius: 10, border: `1.5px solid ${activeTab === tab.id ? "#8B5CF6" : "#E8E5F0"}`, background: activeTab === tab.id ? "#F0EDFF" : "#fff", fontSize: 13, fontWeight: activeTab === tab.id ? 600 : 500, color: activeTab === tab.id ? "#8B5CF6" : "#4A4362", cursor: "pointer", fontFamily: "'Outfit', sans-serif" }}>
            <span>{tab.icon}</span> {tab.label}
          </button>
        ))}
      </div>

      <div style={{ marginBottom: 32 }}>
        {activeTab === "pdf" && (
          <div>
            <input ref={fileRef} type="file" accept=".pdf" onChange={handlePDF} style={{ display: "none" }} />
            <div onClick={() => fileRef.current?.click()} style={{ border: "2px dashed #E8E5F0", borderRadius: 16, padding: "48px 32px", textAlign: "center", cursor: "pointer", background: "#fff" }}>
              <span style={{ fontSize: 40, display: "block", marginBottom: 12 }}>📄</span>
              <h3 style={{ fontSize: 16, fontWeight: 600, marginBottom: 6 }}>Upload PDF Document</h3>
              <p style={{ fontSize: 13, color: "#8E87A5" }}>Click to browse or drag & drop</p>
              <p style={{ fontSize: 11, color: "#C4BED6", marginTop: 8 }}>Text extracted automatically using AI</p>
            </div>
          </div>
        )}
        {activeTab === "url" && (
          <div style={{ background: "#fff", borderRadius: 16, border: "1px solid #E8E5F0", padding: 28 }}>
            <h3 style={{ fontSize: 16, fontWeight: 600, marginBottom: 12 }}>Scrape Website Content</h3>
            <p style={{ fontSize: 13, color: "#8E87A5", marginBottom: 20 }}>Enter a URL and we'll extract relevant content using AI.</p>
            <div style={{ display: "flex", gap: 12 }}>
              <input value={urlInput} onChange={e => setUrlInput(e.target.value)} onKeyDown={e => { if (e.key === "Enter") handleURL(); }} placeholder="https://www.yourcompany.com/faq" style={inputStyle} />
              <button onClick={handleURL} disabled={urlLoading} style={{ ...btnPrimary, opacity: urlLoading ? 0.6 : 1 }}>{urlLoading ? "Scraping..." : "Extract →"}</button>
            </div>
          </div>
        )}
        {activeTab === "text" && (
          <div style={{ background: "#fff", borderRadius: 16, border: "1px solid #E8E5F0", padding: 28 }}>
            <h3 style={{ fontSize: 16, fontWeight: 600, marginBottom: 12 }}>Paste Custom Content</h3>
            <input value={textName} onChange={e => setTextName(e.target.value)} placeholder="Document name (e.g., Return Policy)" style={{ ...inputStyle, marginBottom: 12 }} />
            <textarea value={textInput} onChange={e => setTextInput(e.target.value)} placeholder="Paste your content here..." rows={10} style={{ ...inputStyle, resize: "vertical", lineHeight: 1.6, marginBottom: 16 }} />
            <button onClick={handleText} style={btnPrimary}>Add to Knowledge Base →</button>
          </div>
        )}
      </div>

      <h3 style={{ fontSize: 16, fontWeight: 600, marginBottom: 16 }}>Documents ({(agent.knowledgeBase || []).length})</h3>
      {(agent.knowledgeBase || []).length === 0 ? (
        <div style={{ textAlign: "center", padding: 48, background: "#fff", borderRadius: 16, border: "1px solid #E8E5F0" }}>
          <span style={{ fontSize: 40, display: "block", marginBottom: 12 }}>📂</span>
          <p style={{ fontSize: 14, color: "#8E87A5" }}>No documents yet.</p>
        </div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {(agent.knowledgeBase || []).map(item => (
            <div key={item.id} style={{ display: "flex", alignItems: "flex-start", gap: 14, background: "#fff", borderRadius: 12, border: "1px solid #E8E5F0", padding: 16 }}>
              <div style={{ width: 40, height: 40, borderRadius: 10, background: "#F0EDFF", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, flexShrink: 0 }}>
                {item.type === "pdf" ? "📄" : item.type === "url" ? "🌐" : "📝"}
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 14, fontWeight: 500 }}>{item.name}</div>
                <div style={{ fontSize: 12, color: "#8E87A5", marginTop: 2 }}>{item.type.toUpperCase()} · {(item.content || "").length.toLocaleString()} chars</div>
                <div style={{ fontSize: 12, color: "#C4BED6", marginTop: 4 }}>{(item.content || "").slice(0, 120)}...</div>
              </div>
              <button onClick={() => removeKB(item.id)} style={{ width: 28, height: 28, borderRadius: 6, border: "1px solid #E8E5F0", background: "transparent", cursor: "pointer", fontSize: 12, color: "#F43F5E", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>✕</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function ChannelsView({ agent, updateAgent }) {
  const [waConfig, setWaConfig] = useState(agent.waConfig || { phoneNumberId: "", businessAccountId: "", accessToken: "", webhookVerifyToken: "", connected: false, live: false });
  const [rcsConfig, setRcsConfig] = useState(agent.rcsConfig || { agentId: "", serviceAccountKey: "", connected: false, live: false });
  const [activeChannel, setActiveChannel] = useState("whatsapp");
  const [showToken, setShowToken] = useState(false);
  const [testStatus, setTestStatus] = useState(null);
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);

  const webhookUrl = "https://api.agntpro.ai/webhook/" + agent.id;
  const agentIdShort = agent.id.slice(0, 12);

  function saveConfig() {
    setSaving(true);
    setTimeout(() => {
      updateAgent(agent.id, { waConfig, rcsConfig });
      setSaving(false);
      setSaved(true);
      setTimeout(() => setSaved(false), 2000);
    }, 800);
  }

  function testConnection(channel) {
    setTestStatus("testing");
    setTimeout(() => {
      if (channel === "whatsapp" && waConfig.phoneNumberId && waConfig.accessToken) {
        setWaConfig(prev => ({ ...prev, connected: true }));
        setTestStatus("success");
      } else if (channel === "rcs" && rcsConfig.agentId) {
        setRcsConfig(prev => ({ ...prev, connected: true }));
        setTestStatus("success");
      } else {
        setTestStatus("error");
      }
      setTimeout(() => setTestStatus(null), 3000);
    }, 1500);
  }

  function toggleLive(channel) {
    if (channel === "whatsapp") {
      const newState = !waConfig.live;
      setWaConfig(prev => ({ ...prev, live: newState }));
      updateAgent(agent.id, { waConfig: { ...waConfig, live: newState } });
    } else {
      const newState = !rcsConfig.live;
      setRcsConfig(prev => ({ ...prev, live: newState }));
      updateAgent(agent.id, { rcsConfig: { ...rcsConfig, live: newState } });

    navigator.clipboard.writeText(text).catch(() => {});

    { id: "whatsapp", icon: "💬", label: "WhatsApp Business API", color: "#25D366", connected: waConfig.connected, live: waConfig.live },
    { id: "rcs", icon: "📱", label: "RCS Business Messaging", color: "#4285F4", connected: rcsConfig.connected, live: rcsConfig.live },

      {/* RCS Config */}
      {activeChannel === "rcs" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
          <div style={{ background: rcsConfig.connected ? "#ECFDF5" : "#FFF7ED", border: `1px solid ${rcsConfig.connected ? "#A7F3D0" : "#FED7AA"}`, borderRadius: 14, padding: "16px 20px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <span style={{ fontSize: 20 }}>{rcsConfig.connected ? "✅" : "⚠️"}</span>
              <div>
                <div style={{ fontSize: 14, fontWeight: 600, color: rcsConfig.connected ? "#065F46" : "#92400E" }}>{rcsConfig.connected ? "RCS Business Messaging Connected" : "RCS Not Connected"}</div>
                <div style={{ fontSize: 12, color: rcsConfig.connected ? "#047857" : "#B45309", marginTop: 2 }}>{rcsConfig.connected ? "Your agent is ready on RCS" : "Configure your Google RCS Business Messaging agent"}</div>
              </div>
            </div>
            {rcsConfig.connected && (
              <div onClick={() => toggleLive("rcs")} style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer", userSelect: "none" }}>
                <span style={{ fontSize: 13, fontWeight: 600, color: rcsConfig.live ? "#10B981" : "#8E87A5" }}>{rcsConfig.live ? "Live" : "Test"}</span>
                <div style={{ width: 44, height: 24, borderRadius: 12, background: rcsConfig.live ? "#10B981" : "#E8E5F0", padding: 2, transition: "all 0.25s", cursor: "pointer" }}>
                  <div style={{ width: 20, height: 20, borderRadius: 10, background: "#fff", boxShadow: "0 1px 3px rgba(0,0,0,0.15)", transform: rcsConfig.live ? "translateX(20px)" : "translateX(0)", transition: "all 0.25s" }} />
                </div>
              </div>
            )}
          </div>

          <div style={{ background: "#fff", borderRadius: 16, border: "1px solid #E8E5F0", padding: 28 }}>
            <h3 style={{ fontSize: 16, fontWeight: 600, marginBottom: 16 }}>Google RCS Business Messaging Credentials</h3>
            <p style={{ fontSize: 13, color: "#8E87A5", marginBottom: 20, lineHeight: 1.6 }}>
              Get these from <strong>Google Business Communications Console</strong>. You need a verified RCS Business Messaging agent.
            </p>
            <div style={{ marginBottom: 16 }}>
              <label style={{ fontSize: 12, fontWeight: 600, color: "#4A4362", display: "block", marginBottom: 6 }}>RCS Agent ID *</label>
              <input value={rcsConfig.agentId} onChange={e => setRcsConfig(prev => ({ ...prev, agentId: e.target.value }))} placeholder="e.g., brands/your-brand/agents/your-agent" style={inputStyle} />
            </div>
            <div style={{ marginBottom: 16 }}>
              <label style={{ fontSize: 12, fontWeight: 600, color: "#4A4362", display: "block", marginBottom: 6 }}>Service Account Key (JSON) *</label>
              <textarea value={rcsConfig.serviceAccountKey} onChange={e => setRcsConfig(prev => ({ ...prev, serviceAccountKey: e.target.value }))} placeholder='Paste your service account JSON key here...' rows={4} style={{ ...inputStyle, fontFamily: "'JetBrains Mono'", fontSize: 12, resize: "vertical", lineHeight: 1.6 }} />
            </div>
            <div style={{ display: "flex", gap: 12 }}>
              <button onClick={() => testConnection("rcs")} disabled={testStatus === "testing"} style={{ ...btnPrimary, background: testStatus === "success" ? "#10B981" : "#8B5CF6" }}>
                {testStatus === "testing" ? "⏳ Testing..." : testStatus === "success" ? "✅ Connected!" : "🔗 Test Connection"}
              </button>
              <button onClick={saveConfig} style={btnOutline}>Save</button>
            </div>
          </div>

          <div style={{ background: "#EFF6FF", border: "1px solid #BFDBFE", borderRadius: 14, padding: 20 }}>
            <h4 style={{ fontSize: 14, fontWeight: 600, color: "#1E40AF", marginBottom: 8 }}>📱 RCS vs WhatsApp</h4>
            <p style={{ fontSize: 13, color: "#1E40AF", lineHeight: 1.7 }}>RCS delivers app-like rich messaging directly in the native SMS app — no app download needed. Supports carousels, suggested actions, rich cards, and branded sender profiles. Works on 1.2B+ devices worldwide.</p>
          </div>
        </div>
      )}
    </div>
  );
}

// ============================================================
// SETTINGS VIEW
// ============================================================
function SettingsView({ agent, updateAgent }) {
  const [prompt, setPrompt] = useState(agent.prompt);
  const [name, setName] = useState(agent.name);
  const [saved, setSaved] = useState(false);

  useEffect(() => { setPrompt(agent.prompt); setName(agent.name); }, [agent.id]);

  function handleSave() {
    updateAgent(agent.id, { prompt, name });
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  }

  return (
    <div style={{ padding: "28px 32px", maxWidth: 1000 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 28 }}>
        <div>
          <h1 style={{ fontSize: 26, fontWeight: 700, letterSpacing: -0.5, marginBottom: 4 }}>Agent Configuration</h1>
          <p style={{ fontSize: 14, color: "#8E87A5" }}>Customize <strong>{agent.name}</strong></p>
        </div>
        <button onClick={handleSave} style={{ ...btnPrimary, background: saved ? "#10B981" : "#8B5CF6" }}>{saved ? "✓ Saved!" : "Save Changes"}</button>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 300px", gap: 24 }}>
        <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
          <div>
            <label style={{ fontSize: 13, fontWeight: 600, display: "block", marginBottom: 6 }}>Agent Name</label>
            <input value={name} onChange={e => setName(e.target.value)} style={inputStyle} />
          </div>
          <div>
            <label style={{ fontSize: 13, fontWeight: 600, display: "block", marginBottom: 6 }}>System Prompt</label>
            <p style={{ fontSize: 12, color: "#8E87A5", marginBottom: 8 }}>Core instruction that defines behavior, tone, and capabilities.</p>
            <textarea value={prompt} onChange={e => setPrompt(e.target.value)} rows={18} style={{ ...inputStyle, fontFamily: "'JetBrains Mono', monospace", fontSize: 13, resize: "vertical", lineHeight: 1.7 }} />
            <div style={{ fontSize: 11, color: "#C4BED6", textAlign: "right", marginTop: 4 }}>{prompt.length} characters</div>
          </div>
        </div>
        <div style={{ background: "#FFFBEB", border: "1px solid #FDE68A", borderRadius: 14, padding: 20, height: "fit-content" }}>
          <h4 style={{ fontSize: 14, fontWeight: 600, color: "#92400E", marginBottom: 12 }}>✏️ Prompt Tips</h4>
          <div style={{ fontSize: 13, color: "#92400E", lineHeight: 2 }}>
            <p>• Start with role and company</p>
            <p>• List capabilities clearly</p>
            <p>• Define the tone</p>
            <p>• Add guardrails</p>
            <p>• Include sample data</p>
            <p>• Specify escalation rules</p>
          </div>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// ANALYTICS
// ============================================================
function AnalyticsView({ agent }) {
  const stats = [
    { label: "Total Conversations", value: agent.conversations?.length || 0, icon: "💬", color: "#8B5CF6" },
    { label: "KB Documents", value: agent.knowledgeBase?.length || 0, icon: "📚", color: "#3B82F6" },
    { label: "Avg Response Time", value: "1.2s", icon: "⚡", color: "#F97316" },
    { label: "Resolution Rate", value: "89%", icon: "✅", color: "#10B981" },
  ];

  return (
    <div style={{ padding: "28px 32px", maxWidth: 1000 }}>
      <h1 style={{ fontSize: 26, fontWeight: 700, letterSpacing: -0.5, marginBottom: 4 }}>Analytics</h1>
      <p style={{ fontSize: 14, color: "#8E87A5", marginBottom: 28 }}>Performance for <strong>{agent.name}</strong></p>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 16, marginBottom: 24 }}>
        {stats.map((s, i) => (
          <div key={i} style={{ background: "#fff", borderRadius: 14, border: "1px solid #E8E5F0", padding: 24, textAlign: "center" }}>
            <div style={{ width: 48, height: 48, borderRadius: 14, background: s.color + "15", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 12px", fontSize: 22 }}>{s.icon}</div>
            <div style={{ fontSize: 28, fontWeight: 700, fontFamily: "'JetBrains Mono'" }}>{s.value}</div>
            <div style={{ fontSize: 13, color: "#8E87A5", marginTop: 4 }}>{s.label}</div>
          </div>
        ))}
      </div>
      <div style={{ background: "#fff", borderRadius: 16, border: "1px solid #E8E5F0", padding: 48, textAlign: "center" }}>
        <span style={{ fontSize: 48, display: "block", marginBottom: 16 }}>📊</span>
        <h3 style={{ fontSize: 18, fontWeight: 600, marginBottom: 8 }}>Detailed Analytics Coming Soon</h3>
        <p style={{ fontSize: 14, color: "#8E87A5" }}>Conversation logs, sentiment analysis, funnel metrics, and custom reports.</p>
      </div>
    </div>
  );
}

// ============================================================
// MODAL
// ============================================================
function Modal({ children, onClose, title }) {
  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(26,16,53,0.5)", backdropFilter: "blur(8px)", display: "flex", justifyContent: "center", alignItems: "center", zIndex: 2000, padding: 24 }}>
      <div onClick={e => e.stopPropagation()} style={{ background: "#fff", borderRadius: 20, boxShadow: "0 20px 60px rgba(0,0,0,0.15)", width: "100%", maxWidth: 520, padding: 28 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <h2 style={{ fontSize: 20, fontWeight: 700 }}>{title}</h2>
          <button onClick={onClose} style={{ width: 32, height: 32, borderRadius: 8, border: "1px solid #E8E5F0", background: "transparent", cursor: "pointer", fontSize: 14, color: "#8E87A5", display: "flex", alignItems: "center", justifyContent: "center" }}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

const btnSecondary = { background: "#F0EDFF", color: "#8B5CF6", border: "none", padding: "8px 18px", borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "'Outfit', sans-serif" };
const btnOutline = { background: "#fff", color: "#4A4362", border: "1.5px solid #E8E5F0", padding: "8px 18px", borderRadius: 8, fontSize: 13, fontWeight: 500, cursor: "pointer", fontFamily: "'Outfit', sans-serif" };
const cardStyle = { background: "#fff", borderRadius: 14, border: "1px solid #E8E5F0", padding: 20 };

const inputStyle = { width: "100%", padding: "11px 16px", border: "1.5px solid #E8E5F0", borderRadius: 10, fontSize: 14, fontFamily: "'Outfit', sans-serif", outline: "none", background: "#FAFBFD" };
